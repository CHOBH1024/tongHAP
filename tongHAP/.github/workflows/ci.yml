name: CI

on:
  push:
    branches: ['**']
    paths: ['tongHAP/**']
  pull_request:
    branches: [main]
    paths: ['tongHAP/**']

defaults:
  run:
    working-directory: tongHAP

jobs:
  build:
    name: Type Check & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tongHAP/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
