<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIRROR INSIGHT | 10대 핵심 진단 가이드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #020617; color: white; scroll-behavior: smooth; }
        .glass-card { background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .sticky-nav { background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(10px); }
        .gradient-border { border: 2px solid; border-image: linear-gradient(135deg, #6366f1, #a855f7) 1; }
        .benefit-item { display: flex; align-items: start; gap: 12px; font-size: 0.85rem; color: #94a3b8; }
        .benefit-item i { margin-top: 2px; }
        .category-tab { cursor: pointer; transition: all 0.3s ease; }
        .category-tab.active { background: #6366f1; color: white; border-color: #6366f1; }
    </style>
</head>
<body class="pb-32">

    <!-- Hero Header -->
    <header class="pt-20 pb-12 px-8 text-center relative overflow-hidden">
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[500px] h-[500px] bg-indigo-500/10 blur-[120px] rounded-full"></div>
        <h1 class="text-4xl md:text-5xl font-black tracking-tighter mb-4 relative z-10">MIRROR <span class="text-indigo-500 italic">INSIGHT</span></h1>
        <p class="text-slate-500 text-sm font-bold uppercase tracking-widest relative z-10">10 Comprehensive Diagnostic Guides</p>
    </header>

    <!-- Navigation Tabs -->
    <div class="sticky top-0 z-[100] sticky-nav py-4 mb-12 border-b border-white/5 overflow-x-auto">
        <div class="flex gap-2 px-8 min-w-max">
            <button onclick="scrollToMirror('I')" class="category-tab px-4 py-2 rounded-full border border-white/10 text-[10px] font-black uppercase tracking-widest hover:bg-white/5">I-Vocation</button>
            <button onclick="scrollToMirror('L')" class="category-tab px-4 py-2 rounded-full border border-white/10 text-[10px] font-black uppercase tracking-widest hover:bg-white/5">L-Leadership</button>
            <button onclick="scrollToMirror('A')" class="category-tab px-4 py-2 rounded-full border border-white/10 text-[10px] font-black uppercase tracking-widest hover:bg-white/5">A-Authenticity</button>
            <button onclick="scrollToMirror('S')" class="category-tab px-4 py-2 rounded-full border border-white/10 text-[10px] font-black uppercase tracking-widest hover:bg-white/5">S-Social</button>
            <button onclick="scrollToMirror('G')" class="category-tab px-4 py-2 rounded-full border border-white/10 text-[10px] font-black uppercase tracking-widest hover:bg-white/5">G-Generation</button>
            <button onclick="scrollToMirror('C')" class="category-tab px-4 py-2 rounded-full border border-white/10 text-[10px] font-black uppercase tracking-widest hover:bg-white/5">C-Counseling</button>
            <button onclick="scrollToMirror('P')" class="category-tab px-4 py-2 rounded-full border border-white/10 text-[10px] font-black uppercase tracking-widest hover:bg-white/5">P-Personal</button>
            <button onclick="scrollToMirror('V')" class="category-tab px-4 py-2 rounded-full border border-white/10 text-[10px] font-black uppercase tracking-widest hover:bg-white/5">V-Lifestyle</button>
        </div>
    </div>

    <!-- Mirror Content List -->
    <div class="max-w-4xl mx-auto px-6 space-y-24" id="mirror-container">
        <!-- Content will be injected here -->
    </div>

    <script>

                    '대중 연설 및 설교 전달력의 객관적 진단',
                    '팀원 동기부여 및 권한 위임 역량 점검',

                    '변화 관리 및 조직 혁신 주도 능력 측정'
                ]
            },
            {
                id: 'A', color: 'teal', title: 'A-Mirror (진정성 및 일치)', sub: '삶의 무게를 다는 세 번째 거울',

                    '지역 사회 기여도 및 사회적 연대 의식 분석',
                    '사회적 변화에 따른 리스크 관리 능력 평가'
                ]
            },
            {
                id: 'G', color: 'violet', title: 'G-Mirror (세대 공감)', sub: '세대 간 벽을 허무는 다섯 번째 거울',
                benefits: [
                    'MZ세대 등 타 세대와의 소통 역량 진단',

                benefits: [

                    '영적 상담과 현대 심리학적 접근의 조화',
                    '대상자 변화 단계별 맞춤형 대응 전략 수립'
                ]
            },
            {
                id: 'P', color: 'orange', title: 'P-Mirror (개인 역량)', sub: '나의 가치를 증명하는 일곱 번째 거울',
                benefits: [
                    '업무 실행력과 데드라인 준수도 정밀 분석',
                    '대인 관계에서의 매력도와 호감 지수 측정',
                    '문제 해결을 위한 지능적 일머리(Sense) 분석',
                    '타인 설득 및 비즈니스 협상 능력 점검',

                ]
            },
            {
                id: 'V', color: 'emerald', title: 'V-Mirror (라이프스타일)', sub: '일상의 활력을 찾는 여덟 번째 거울',
                benefits: [
                    '일과 삶의 균형(Work-Life Balance) 상태 진단',
                    '스트레스 해소를 위한 자신만의 취향 발견',
                    '정서적 에너지를 충전하는 핵심 활동 확인',
                    '라이프스타일의 생산성 및 질적 수준 점검',

                ]
            }
        ];

        function renderMirrors() {
            const container = document.getElementById('mirror-container');
            container.innerHTML = mirrorData.map(m => `
                <section id="mirror-${m.id}" class="space-y-8 fade-in">
                    <div class="flex items-center gap-6">
                        <div class="w-16 h-16 rounded-[2rem] bg-${m.color}-500/10 flex items-center justify-center text-${m.color}-400 text-3xl font-black border border-${m.color}-500/20 shadow-lg shadow-${m.color}-950/20">
                            ${m.id}
                        </div>
                        <div>
                            <h2 class="text-2xl font-black">${m.title}</h2>
                            <p class="text-slate-500 text-sm font-medium">${m.sub}</p>
                        </div>
                    </div>
                    
                    <div class="glass-card p-8 rounded-[3rem] border-l-4 border-l-${m.color}-500">
                        <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-6">10 Key Benefits & Insights</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-y-4 gap-x-8">
                            ${m.benefits.map((b, i) => `
                                <div class="benefit-item">
                                    <i data-lucide="check-circle-2" class="w-4 h-4 text-${m.color}-500 flex-shrink-0"></i>
                                    <span>${b}</span>
                                </div>
                            `).join('')}
                        </div>
                        <div class="mt-10 pt-8 border-t border-white/5 space-y-4">
                            <h4 class="text-[10px] font-black text-indigo-400 uppercase tracking-widest mb-4">Select Diagnostic Depth</h4>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                                <a href="mirror_engine.html?type=${m.id}&count=30" class="flex flex-col items-center justify-center p-4 bg-white/5 hover:bg-white/10 rounded-2xl border border-white/5 transition-all group">
                                    <span class="text-lg font-black text-white">30</span>
                                    <span class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mt-1">Quick (5m)</span>
                                </a>
                                <a href="mirror_engine.html?type=${m.id}&count=70" class="flex flex-col items-center justify-center p-4 bg-indigo-600/20 hover:bg-indigo-600/40 rounded-2xl border border-indigo-500/30 transition-all group">

                                    <span class="text-[9px] font-bold text-indigo-500/60 uppercase tracking-widest mt-1">Standard (15m)</span>
                                </a>
                                <a href="mirror_engine.html?type=${m.id}&count=120" class="flex flex-col items-center justify-center p-4 bg-indigo-600 hover:bg-indigo-500 rounded-2xl transition-all group shadow-lg shadow-indigo-950/40">
                                    <span class="text-lg font-black text-white">120</span>
                                    <span class="text-[9px] font-bold text-indigo-100 uppercase tracking-widest mt-1">Deep (30m)</span>

            `).join('');
            lucide.createIcons();
        }

        function scrollToMirror(id) {
            document.getElementById('mirror-' + id).scrollIntoView({ behavior: 'smooth', block: 'center' });
            // Update active tab style
            document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
        }

        renderMirrors();
    </script>
</body>
</html>
