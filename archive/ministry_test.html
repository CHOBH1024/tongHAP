<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINISTRY TEST | 신한국 총무국</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: #020617; 
            color: white;
            background-image: radial-gradient(circle at 50% 100%, rgba(30, 41, 59, 1) 0%, rgba(2, 6, 23, 1) 100%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.4s ease;
        }
        .option-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .option-card:hover {
            border-color: #6366f1;
            background: rgba(99, 102, 241, 0.1);
            transform: scale(1.02);
        }
        .option-card.selected {
            background: rgba(99, 102, 241, 0.2);
            border-color: #6366f1;
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.3);
        }
        .progress-bar {
            height: 4px;
            background: #6366f1;
            box-shadow: 0 0 15px #6366f1;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .gradient-text {
            background: linear-gradient(90deg, #818cf8, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="min-h-screen p-8 flex flex-col items-center justify-center">

    <div class="w-full max-w-4xl">
        <!-- Header -->
        <header class="flex justify-between items-end mb-16 px-4">
            <div>
                <a href="system_b_dashboard.html" class="flex items-center gap-2 text-slate-500 hover:text-white transition-all mb-4 text-xs font-bold uppercase tracking-widest">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Dashboard
                </a>
                <h1 class="text-4xl font-black tracking-tighter">목회유형 <span class="gradient-text">진단 도구</span></h1>
            </div>
            <div class="text-right">
                <span id="qCount" class="text-[10px] font-black text-indigo-400 uppercase tracking-[0.2em]">Step 1 / 12</span>
                <div class="w-48 h-1 bg-white/10 mt-3 rounded-full overflow-hidden">
                    <div id="progressBar" class="progress-bar" style="width: 8.33%"></div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main id="quizContainer" class="glass-card p-12 md:p-20 rounded-[4rem] min-h-[600px] relative">
            <div id="questionView" class="fade-in">
                <div id="questionTag" class="inline-block px-3 py-1 bg-indigo-500/10 border border-indigo-500/20 rounded-full text-[10px] font-black text-indigo-400 mb-8 uppercase tracking-widest">Leadership Focus</div>
                <h2 id="questionText" class="text-2xl md:text-3xl font-bold mb-16 leading-tight">목회 활동 중 당신이 가장 보람을 느끼는 순간은 언제입니까?</h2>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="options">
                    <!-- Options injected by JS -->
                </div>

                <div class="mt-20 flex justify-between items-center">
                    <button onclick="prevQuestion()" class="text-slate-500 hover:text-white transition-colors text-xs font-black uppercase tracking-widest">Previous</button>
                    <button onclick="nextQuestion()" id="nextBtn" class="px-10 py-4 bg-white text-slate-900 rounded-2xl text-sm font-black transition-all hover:bg-indigo-50 disabled:opacity-30" disabled>Next Step</button>
                </div>
            </div>

            <!-- Result View (Hidden initially) -->
            <div id="resultView" class="hidden text-center py-8 fade-in">
                <div class="w-24 h-24 bg-indigo-600 text-white rounded-[2rem] flex items-center justify-center text-4xl mx-auto mb-10 shadow-2xl shadow-indigo-500/40">
                    <i data-lucide="award" class="w-12 h-12"></i>
                </div>
                <h2 class="text-4xl font-black mb-4">심층 진단 결과</h2>
                <p class="text-slate-400 mb-16 font-medium">귀하의 핵심 목회 스타일 및 역량 지표입니다.</p>
                
                <div id="resultType" class="text-6xl font-black gradient-text mb-8">지도자형 (Leader)</div>
                <p id="resultDesc" class="max-w-2xl mx-auto text-slate-400 leading-relaxed mb-16 text-lg">
                    비전 제시와 조직 이끌기에 탁월한 능력을 보유하고 계십니다. 
                    강력한 설교와 방향성을 통해 공동체를 역동적으로 변화시키는 스타일입니다.
                </p>

                <div class="grid grid-cols-2 md:grid-cols-4 gap-8 mb-16" id="scoreBars">
                    <!-- Score bars injected by JS -->
                </div>

                <div class="flex justify-center gap-4">
                    <button onclick="location.reload()" class="px-8 py-4 bg-slate-800 hover:bg-slate-700 rounded-2xl text-sm font-bold transition-all">다시 진단</button>
                    <button onclick="saveResult()" class="px-8 py-4 bg-indigo-600 hover:bg-indigo-500 rounded-2xl text-sm font-black transition-all shadow-xl shadow-indigo-500/20">데이터베이스 저장</button>
                </div>
            </div>
        </main>

        <footer class="mt-12 text-center opacity-30">
            <div class="text-[10px] font-mono tracking-widest uppercase">New Korea Strategic Admin Core v6.0</div>
        </footer>
    </div>

    <script>
        lucide.createIcons();

        const questions = [
            {
                tag: "Core Passion",
                q: "목회 활동 중 당신이 가장 보람을 느끼는 순간은 언제입니까?",
                options: [
                    { text: "새로운 지역에 교회를 개척하고 전도 성과가 날 때", type: "Pioneer" },
                    { text: "행정 체계가 잡히고 재무가 투명하게 관리될 때", type: "Manager" },
                    { text: "식구들의 아픔을 상담하고 마음의 상처가 치유될 때", type: "Parent" },
                    { text: "대중 앞에서 비전을 선포하고 큰 변화를 이끌어낼 때", type: "Leader" }
                ]
            },
            {
                tag: "Conflict Management",
                q: "교회 내 갈등이 발생했을 때 당신의 대처 방식은?",
                options: [
                    { text: "새로운 활동을 제안하여 갈등을 잊게 만든다", type: "Pioneer" },
                    { text: "원칙과 규정에 따라 철저하게 시시비비를 가린다", type: "Manager" },
                    { text: "당사자들의 이야기를 끝까지 들어주고 포용한다", type: "Parent" },
                    { text: "전체적인 방향성을 재확인시키며 리더십을 발휘한다", type: "Leader" }
                ]
            },
            {
                tag: "Time Allocation",
                q: "업무 시간 중 가장 많은 공을 들이는 부분은?",
                options: [
                    { text: "외부 네트워크 확장 및 새로운 사역 발굴", type: "Pioneer" },
                    { text: "주간 보고서 작성 및 재무 현황 점검", type: "Manager" },
                    { text: "식구 심방 및 1:1 면담", type: "Parent" },
                    { text: "설교 준비 및 전략적 회의 주재", type: "Leader" }
                ]
            },
            {
                tag: "Growth Strategy",
                q: "교회 성장을 위해 가장 중요하다고 생각하는 요소는?",
                options: [
                    { text: "공격적인 전도와 개척 정신", type: "Pioneer" },
                    { text: "안정적인 시스템과 효율적인 조직 운영", type: "Manager" },
                    { text: "식구들 간의 끈끈한 사랑과 공동체 의식", type: "Parent" },
                    { text: "강력한 리더십과 명확한 비전 공유", type: "Leader" }
                ]
            },
            {
                tag: "Crisis Response",
                q: "예기치 못한 재정적 위기가 닥쳤을 때 당신은?",
                options: [
                    { text: "새로운 후원 프로젝트를 바로 기획한다", type: "Pioneer" },
                    { text: "지출을 전면 동결하고 예산을 재편성한다", type: "Manager" },
                    { text: "식구들에게 정직하게 알리고 함께 기도로 이겨낸다", type: "Parent" },
                    { text: "위기를 기회로 바꾸기 위한 대담한 투자를 고려한다", type: "Leader" }
                ]
            },
            {
                tag: "Communication Style",
                q: "당신의 주된 의사소통 스타일은?",
                options: [
                    { text: "도전적이고 열정적인 권유", type: "Pioneer" },
                    { text: "논리적이고 데이터에 근거한 설명", type: "Manager" },
                    { text: "부드럽고 공감적인 경청", type: "Parent" },
                    { text: "위엄 있고 설득력 있는 지시", type: "Leader" }
                ]
            },
            {
                tag: "Evaluation Metric",
                q: "당신을 가장 잘 설명하는 단어는?",
                options: [
                    { text: "개척자 (Pioneer)", type: "Pioneer" },
                    { text: "조직가 (Organizer)", type: "Manager" },
                    { text: "상담가 (Counselor)", type: "Parent" },
                    { text: "전략가 (Strategist)", type: "Leader" }
                ]
            },
            {
                tag: "Team Building",
                q: "부교역자를 선발할 때 가장 중요하게 보는 점은?",
                options: [
                    { text: "독자적으로 일을 만들어낼 수 있는 실행력", type: "Pioneer" },
                    { text: "꼼꼼하게 업무를 처리하는 성실함", type: "Manager" },
                    { text: "사람들과 잘 융화되는 인성", type: "Parent" },
                    { text: "전체 흐름을 읽는 통찰력", type: "Leader" }
                ]
            },
            {
                tag: "Preaching Focus",
                q: "설교의 핵심 테마로 주로 삼는 것은?",
                options: [
                    { text: "세상을 향한 도전과 혁신", type: "Pioneer" },
                    { text: "올바른 신앙 생활의 질서와 원칙", type: "Manager" },
                    { text: "하늘부모님의 심정과 위로", type: "Parent" },
                    { text: "섭리적 비전과 시대적 사명", type: "Leader" }
                ]
            },
            {
                tag: "Resource Management",
                q: "여유 자금이 생겼을 때 가장 먼저 하고 싶은 일은?",
                options: [
                    { text: "새로운 지부 설립 또는 전도 센터 강화", type: "Pioneer" },
                    { text: "교회 시설 보수 및 노후 장비 교체", type: "Manager" },
                    { text: "소외된 식구들을 위한 복지 기금 마련", type: "Parent" },
                    { text: "대규모 컨퍼런스 또는 홍보 캠페인 진행", type: "Leader" }
                ]
            },
            {
                tag: "Self-Reflection",
                q: "자신의 가장 큰 단점이라고 생각하는 것은?",
                options: [
                    { text: "마무리가 다소 부족하고 금방 새로운 것에 눈을 돌림", type: "Pioneer" },
                    { text: "융통성이 부족하고 규칙에 너무 얽매임", type: "Manager" },
                    { text: "정(情)에 끌려 과감한 결단을 내리지 못함", type: "Parent" },
                    { text: "독단적으로 비춰질 수 있고 세세한 부분을 놓침", type: "Leader" }
                ]
            },
            {
                tag: "Legacy",
                q: "임기를 마칠 때 어떤 목회자로 기억되고 싶습니까?",
                options: [
                    { text: "불가능을 가능케 했던 열정적인 개척자", type: "Pioneer" },
                    { text: "교회의 기초를 단단히 다진 현명한 관리자", type: "Manager" },
                    { text: "모든 식구의 마음을 품어준 따뜻한 부모", type: "Parent" },
                    { text: "공동체의 수준을 한 단계 높인 위대한 리더", type: "Leader" }
                ]
            }
        ];

        let currentQ = 0;
        let scores = { Pioneer: 0, Manager: 0, Parent: 0, Leader: 0 };
        let answers = [];

        function renderQuestion() {
            const qData = questions[currentQ];
            document.getElementById('questionTag').innerText = qData.tag;
            document.getElementById('questionText').innerText = qData.q;
            document.getElementById('qCount').innerText = `Step ${currentQ + 1} / ${questions.length}`;
            document.getElementById('progressBar').style.width = `${((currentQ + 1) / questions.length) * 100}%`;

            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            
            qData.options.forEach((opt, idx) => {
                const card = document.createElement('div');
                card.className = `option-card glass-card p-6 rounded-3xl flex items-center gap-4 ${answers[currentQ] === idx ? 'selected' : ''}`;
                card.onclick = () => selectOption(idx);
                card.innerHTML = `
                    <div class="w-10 h-10 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center font-black text-xs">
                        ${String.fromCharCode(65 + idx)}
                    </div>
                    <span class="text-sm font-bold text-slate-300">${opt.text}</span>
                `;
                optionsDiv.appendChild(card);
            });

            document.getElementById('nextBtn').disabled = answers[currentQ] === undefined;
            document.getElementById('nextBtn').innerText = currentQ === questions.length - 1 ? 'Finish Assessment' : 'Next Step';
            lucide.createIcons();
        }

        function selectOption(idx) {
            answers[currentQ] = idx;
            renderQuestion();
        }

        function nextQuestion() {
            if (currentQ < questions.length - 1) {
                currentQ++;
                renderQuestion();
            } else {
                showResults();
            }
        }

        function prevQuestion() {
            if (currentQ > 0) {
                currentQ--;
                renderQuestion();
            }
        }

        function showResults() {
            scores = { Pioneer: 0, Manager: 0, Parent: 0, Leader: 0 };
            answers.forEach((ansIdx, qIdx) => {
                const type = questions[qIdx].options[ansIdx].type;
                scores[type]++;
            });

            document.getElementById('questionView').classList.add('hidden');
            document.getElementById('resultView').classList.remove('hidden');

            const sortedTypes = Object.entries(scores).sort((a, b) => b[1] - a[1]);
            const topType = sortedTypes[0][0];
            
            const typeNames = {
                Pioneer: "혁신 개척자 (Pioneer)",
                Manager: "전략 관리자 (Manager)",
                Parent: "심정 치유자 (Parent)",
                Leader: "비전 지도자 (Leader)"
            };

            const typeDescs = {
                Pioneer: "혁신과 개척에 특화된 목회자입니다. 환경에 굴하지 않고 새로운 길을 만들어가는 에너지가 귀하의 가장 큰 무기입니다.",
                Manager: "질서와 안정을 중시하는 행정 전문가형 목회자입니다. 교회의 모든 자원을 효율적으로 관리하여 지속 가능한 성장을 이끌어냅니다.",
                Parent: "식구들의 마음을 가장 깊게 이해하는 부모형 목회자입니다. 깊은 공감과 심정적 유대를 통해 공동체를 하나로 묶는 탁월한 능력이 있습니다.",
                Leader: "강력한 비전과 통찰력을 지닌 리더형 목회자입니다. 큰 목표를 제시하고 식구들을 일사불란하게 움직이게 하는 카리스마를 보유하고 계십니다."
            };

            document.getElementById('resultType').innerText = typeNames[topType];
            document.getElementById('resultDesc').innerText = typeDescs[topType];

            const scoreBarsDiv = document.getElementById('scoreBars');
            scoreBarsDiv.innerHTML = '';
            Object.entries(scores).forEach(([type, score]) => {
                const pct = (score / questions.length) * 100;
                const barContainer = document.createElement('div');
                barContainer.className = "space-y-3";
                barContainer.innerHTML = `
                    <div class="flex justify-between text-[10px] font-black uppercase text-slate-500 tracking-widest">
                        <span>${type}</span>
                        <span>${Math.round(pct)}%</span>
                    </div>
                    <div class="w-full h-1.5 bg-white/5 rounded-full overflow-hidden">
                        <div class="h-full bg-indigo-500 shadow-[0_0_10px_#6366f1]" style="width: ${pct}%"></div>
                    </div>
                `;
                scoreBarsDiv.appendChild(barContainer);
            });
            lucide.createIcons();
        }

        function saveResult() {
            alert('진단 결과가 전략 시스템에 안전하게 기록되었습니다.');
            window.location.href = 'system_b_dashboard.html';
        }

        renderQuestion();
    </script>
</body>
</html>
